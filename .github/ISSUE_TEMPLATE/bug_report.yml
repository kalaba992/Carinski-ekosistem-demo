name: Bug Report
description: Report broken UI, broken links, responsive layout issues, or deployment issues
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 125 / Windows 11
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or log
      placeholder: Paste screenshot URL or error log
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 — dangerous
        - P1 — blocker
        - P2 — important
        - P3 — polish
    validations:
      required: true
